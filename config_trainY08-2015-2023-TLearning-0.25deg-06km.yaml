defaults:
- data: zarr_gfs-hrrr-pretrain
- dataloader: native_grid
- datamodule: single
- diagnostics: evaluation
- hardware: slurm
- graph: encoder_decoder_only
- model: transformer_gfs-hrrr-pretrain
- training: default
- _self_

config_validation: True

data:
  forcing:
    - cos_latitude
    - sin_latitude
    - cos_longitude
    - sin_longitude
    - cos_julian_day
    - sin_julian_day
    - cos_local_time
    - sin_local_time
    - insolation
    - lsm
    - orog
  diagnostic:
    - accum_tp
    - u80
    - v80
  processors:
    normalizer:
      _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
      config:
        default: mean-std
        std:
          - accum_tp
          - sh2
          - q_100
          - q_150
          - q_200
          - q_250
          - q_300
          - q_400
          - q_500
          - q_600
          - q_700
          - q_850
          - q_925
          - q_1000
        max:
          - orog
        none:
          - cos_latitude
          - sin_latitude
          - cos_longitude
          - sin_longitude
          - cos_julian_day
          - sin_julian_day
          - cos_local_time
          - sin_local_time
          - insolation
          - lsm

dataloader:
  num_workers:
    training: 4
    validation: 4
    test: 4
  batch_size:
    training: 1
    validation: 1
    test: 1
  dataset:
    cutout:
      # LAM
      - dataset: /pscratch/sd/b/bhuang95/nested-eagle/data/0.25deg-06km/data/hrrr.zarr
        trim_edge: [25, 24, 25, 26]
      # GLOBAL
      - dataset: /pscratch/sd/b/bhuang95/nested-eagle/data/0.25deg-06km/data/gfs.zarr
        trim_edge: [0, 0, 0, 0]
    adjust: all
    min_distance_km: 0
  #dataset: /pscratch/sd/b/bhuang95/nested-eagle/data/0.25deg-06km/data/gfs.zarr
  training:
    start: 2015-02-01
    end: 2023-01-31
  validation:
    start: 2023-02-01
    end: 2024-01-31
  test:
    start: 2023-02-01
    end: 2024-01-31

diagnostics:
  plot:
    parameters: []
    precip_and_related_fields: []
    callbacks: []
  checkpoint:
    every_n_minutes:
      save_frequency: null
      num_models_saved: 0
  log:
    mlflow:
      enabled: True
      offline: True
      authentication: False
      log_model: False
      tracking_uri: null
      experiment_name: "trainY01-2018-2018-TLearning-0.25deg-06km"
      project_name: "TLearning-0.25deg-06km-test"
      system: False

hardware:
  num_gpus_per_model: 1
  paths:
    output: /pscratch/sd/b/bhuang95/anemoi-house/replay/atmosphere-subsampled/no-log-ERA5/transfer-learning/training//trainY01-2018-2018-0.25deg/
    data: /pscratch/sd/b/bhuang95/anemoi-house/replay/atmosphere-subsampled/no-log-ERA5/transfer-learning/preprocessing//trainY01-2018-2018-0.25deg/
    graph: /pscratch/sd/b/bhuang95/anemoi-house/replay/atmosphere-subsampled/no-log-ERA5/transfer-learning/training//trainY01-2018-2018-0.25deg/
  files:
    dataset: dataset.zarr

model:
  num_channels: 512
  trainable_parameters:
    data: 0
    hidden: 0
    data2hidden: 0
    hidden2data: 0
    hidden2hidden: 0

training:
  max_steps: 300_000
  fork_run_id: 3b06bebe20c14bcf9c8d763786169adb
  load_weights_only: True
  transfer_learning: True
  optimizer:
    zero: False
    kwargs:
      betas: [0.9, 0.95]
      weight_decay: 0.1
